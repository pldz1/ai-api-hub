name: Build Dist

on:
  push:
    paths:
      - "package.json"
  workflow_dispatch:

jobs:
  build-dist:
    name: Build dist artifact
    runs-on: ubuntu-latest
    environment: main-branch

    env:
      ARTIFACT_NAME: ai-api-hub-dist
      SERVER_NOTICE_URL: ${{ secrets.SERVER_NOTICE_URL }}
      SERVER_DEPLOY_TOKEN: ${{ secrets.SERVER_DEPLOY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist
          if-no-files-found: error

      - name: Notify target server
        if: env.SERVER_NOTICE_URL != '' && env.SERVER_DEPLOY_TOKEN != ''
        run: |
          curl -f -X POST "$SERVER_NOTICE_URL" \
            -H "X-Deploy-Token: ${SERVER_DEPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "folder": "ai-api-hub",
              "artifact_url": "${{ steps.upload.outputs.artifact-url }}"
            }'
